<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{页面标题}}</title>
<style>
  :root {
    --bg: #f2eeea;
    --card: #ffffff;
    --border: #d6cec6;
    --text: #4a4340;
    --text-light: #8a7e78;
    --heading: #5e5450;
    --accent-1: #a89b91;
    --accent-2: #b8a99a;
    --accent-3: #c4b7a6;
    --accent-4: #8d9a8e;
    --accent-5: #97a3a0;
    --quote-bg: #ece8e3;
    --highlight: #d4c5b2;
    --tag-bg: #e6dfda;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                 "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.85;
    font-size: 16px;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  header {
    text-align: center;
    padding: 60px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }

  header h1 {
    font-size: 1.85rem;
    font-weight: 600;
    color: var(--heading);
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  header .subtitle {
    font-size: 0.85rem;
    color: var(--text-light);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .summary-card {
    background: var(--card);
    border-radius: 12px;
    padding: 32px;
    margin-bottom: 36px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 12px rgba(0,0,0,0.03);
  }

  .summary-card h2 {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent-1);
    margin-bottom: 16px;
    font-weight: 600;
  }

  .summary-card p {
    font-size: 0.95rem;
    color: var(--text);
    line-height: 1.9;
  }

  .summary-card strong {
    color: var(--heading);
    font-weight: 600;
  }

  .note {
    font-size: 0.82rem;
    color: var(--text-light);
    font-style: italic;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px dashed var(--border);
    line-height: 1.75;
  }

  .section { margin-bottom: 32px; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .section-number {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.82rem;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }

  /* 假定顺序为 header → summary-card → 若干 .section → footer，首段 .section 为第 3 个子元素 */
  .container > .section:nth-child(3) .section-number { background: var(--accent-1); }
  .container > .section:nth-child(4) .section-number { background: var(--accent-4); }
  .container > .section:nth-child(5) .section-number { background: var(--accent-2); }
  .container > .section:nth-child(6) .section-number { background: var(--accent-5); }
  .container > .section:nth-child(7) .section-number { background: var(--accent-3); }
  .container > .section:nth-child(8) .section-number { background: var(--accent-1); }
  .container > .section:nth-child(9) .section-number { background: var(--accent-4); }
  .container > .section:nth-child(10) .section-number { background: var(--accent-2); }

  .section-header h3 {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--heading);
    line-height: 1.4;
  }

  .time-tag {
    display: inline-block;
    font-size: 0.72rem;
    background: var(--tag-bg);
    color: var(--text-light);
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 12px;
    font-family: "SF Mono", "Fira Code", monospace;
  }

  .section-intro {
    font-size: 0.88rem;
    color: var(--text-light);
    margin-bottom: 16px;
    line-height: 1.8;
    padding-left: 16px;
    border-left: 2px solid var(--border);
  }

  .content-card {
    background: var(--card);
    border-radius: 12px;
    padding: 28px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 12px rgba(0,0,0,0.03);
  }

  .content-card p {
    margin-bottom: 14px;
    font-size: 0.95rem;
    line-height: 1.9;
  }

  .content-card p:last-child { margin-bottom: 0; }

  .content-card strong,
  .summary-card strong {
    color: var(--heading);
    font-weight: 600;
    background: linear-gradient(to top, var(--highlight) 40%, transparent 40%);
    padding: 0 2px;
  }

  .speaker {
    display: inline-block;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .speaker.a { color: var(--accent-1); }
  .speaker.b { color: var(--accent-4); }

  footer {
    text-align: center;
    padding-top: 40px;
    border-top: 1px solid var(--border);
    margin-top: 20px;
  }

  footer p {
    font-size: 0.78rem;
    color: var(--text-light);
    letter-spacing: 0.5px;
  }

  @media (max-width: 600px) {
    .container { padding: 24px 16px 60px; }
    header { padding: 40px 0 28px; }
    header h1 { font-size: 1.45rem; }
    .summary-card, .content-card { padding: 22px 18px; }
    .section-header h3 { font-size: 1rem; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>{{主标题}}</h1>
    <div class="subtitle">{{副标题 / 来源说明}}</div>
  </header>

  <div class="summary-card">
    <h2>全文总结</h2>
    <p>{{总结正文，用 strong 标出关键词}}</p>
    <div class="note">{{可选备注}}</div>
  </div>

  <!-- 章节：按需复制 .section，编号递增 -->
  <div class="section">
    <div class="section-header">
      <div class="section-number">1</div>
      <h3>{{章节标题}}</h3>
    </div>
    <span class="time-tag">⏱ {{时间范围，可选}}</span>
    <div class="section-intro">{{章节引言/背景说明}}</div>
    <div class="content-card">
      <p><span class="speaker a">{{发言人，可选}}</span></p>
      <p>{{正文段落}}</p>
    </div>
  </div>

  <footer>
    <p>{{底部来源说明}}</p>
  </footer>

</div>
</body>
</html>
